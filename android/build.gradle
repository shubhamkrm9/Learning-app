buildscript {
    ext {
        buildToolsVersion = "36.0.0"
        minSdkVersion = 24
        compileSdkVersion = 36
        targetSdkVersion = 36
        ndkVersion = "26.1.10909125"
        kotlinVersion = "2.1.20"
    }
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath("com.android.tools.build:gradle")
        classpath("com.facebook.react:react-native-gradle-plugin")
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin")
        classpath("com.squareup:javawriter:2.5.1")
    }
}

allprojects {
    afterEvaluate { project ->
        if (project.hasProperty("android")) {
            def polyfillPath = file("${rootDir}/format_polyfill.h").absolutePath
            project.android.defaultConfig.externalNativeBuild.cmake.cppFlags "-D_LIBCPP_ENABLE_EXPERIMENTAL", "-include", polyfillPath
            project.android.defaultConfig.externalNativeBuild.ndkBuild.cppFlags "-D_LIBCPP_ENABLE_EXPERIMENTAL", "-include", polyfillPath
        }
    }
}

apply plugin: "com.facebook.react.rootproject"
